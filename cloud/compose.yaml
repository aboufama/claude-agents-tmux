services:
  agents:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    container_name: claude-agents
    init: true
    restart: unless-stopped
    # environment:
    #   - CLAUDE_AGENTS_BACKEND=tmux    # the image ships herdr, so the wrapper
    #                                   # uses it by default; uncomment to pin tmux
    volumes:
      - claude-config:/root/.claude   # auth token + HUD scripts, survives rebuilds
      - work:/root/work               # your repos / project folders

volumes:
  claude-config:
  work:
